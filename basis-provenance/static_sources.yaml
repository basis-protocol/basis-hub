# Basis Provenance — Static Component Source Registry
# ====================================================
# ~148 static components across ~50 unique source URLs.
# Organized by category (A → D) in priority order.
#
# Categories:
#   github_api    — GitHub API endpoints, JSON, <32KB (Category A)
#   protocol_api  — Protocol API endpoints, JSON (Category B)
#   html_docs     — Documentation sites, Range header (Category C)
#   pdf_document  — PDF audit reports, Range header or HEAD (Category D)

storage:
  endpoint_url: "${R2_ENDPOINT_URL}"
  bucket: "basis-provenance"
  public_url_prefix: "${R2_PUBLIC_URL_PREFIX}"
  region: "auto"

registration_endpoint: "${REGISTRATION_ENDPOINT:-http://localhost:5000/api/provenance/register}"

# =============================================================================
# CATEGORY A: GitHub API — closest to existing pattern (~20 sources)
# JSON responses, small payloads, standard TLSNotary sessions
# =============================================================================
